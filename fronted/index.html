<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NyayaShakti – Legal Help</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    h1 { text-align: center; color: #2c3e50; }
    input, textarea, button {
      width: 100%; padding: 10px; margin: 10px 0;
      border-radius: 8px; font-size: 16px; border: 1px solid #ccc;
    }
    #responseBox {
      background: #fff; padding: 15px; border-radius: 8px;
      border: 1px solid #ccc; margin-top: 20px;
    }
    button {
      background-color: #2980b9; color: white; border: none; cursor: pointer;
    }
    button:hover {
      background-color: #1f5f8b;
    }
    @media (max-width: 480px) {
      input, textarea, button { font-size: 14px; }
    }
  </style>
</head>
<body>

  <h1>NyayaShakti 🧾</h1>

  <input type="text" id="userName" placeholder="👤 Apna Naam" required />
  <input type="tel" id="userPhone" placeholder="📱 Phone Number" required />
  <textarea id="queryBox" rows="4" placeholder="✍️ Apni samasya likhiye..."></textarea>
  <input type="file" id="aadhaarUpload" accept=".pdf,.jpg,.png" />

  <button onclick="sendQuery()">🧠 Samasya Submit</button>
  <button id="downloadBtn" onclick="downloadPDF()" style="display:none;">📄 PDF Download</button>

  <div id="responseBox">📢 GPT-style response yahan dikhai dega</div>

  <script>
    async function sendQuery() {
      const name = document.getElementById('userName').value;
      const phone = document.getElementById('userPhone').value;
      const query = document.getElementById('queryBox').value;
      const file = document.getElementById('aadhaarUpload').files[0];

      if (!name || !phone || !query) {
        alert("सभी फ़ील्ड भरना अनिवार्य है।");
        return;
      }

      const formData = new FormData();
      formData.append("name", name);
      formData.append("phone", phone);
      formData.append("query", query);
      if (file) formData.append("aadhaar", file);

      try {
        const response = await fetch("https://nyayashkati-backend.onrender.com/ask", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        document.getElementById("responseBox").innerText = data.reply;
        document.getElementById("downloadBtn").style.display = "inline-block";
      } catch (error) {
        console.error("Error:", error);
        alert("❌ Server se response nahi mila. Kripya baad me try karein.");
      }
    }

    function downloadPDF() {
      window.open("https://nyayashkati-backend.onrender.com/download/output.pdf", "_blank");
    }
  </script>

</body>
</html>
